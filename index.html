<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IELTS Mock</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  font-weight: bold;
  font-size: 20px;
}

/* TOP BUTTONS */
.top {
  position: absolute;
  top: 20px;
  right: 20px;
}

.top button {
  margin-left: 10px;
  padding: 10px 18px;
  background: black;
  color: white;
  border: none;
  border-radius: 25px; /* КРУГЛЫЕ */
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 500px;
  background: url("ielts.jpg") center/cover no-repeat;
  display: flex;
  align-items: center;
  padding-left: 60px;
}

/* TEXT BOX */
.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  max-width: 500px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.box h1 {
  font-size: 28px;
  margin: 0;
}

.box p {
  margin-top: 10px;
  color: #555;
  font-style: italic;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 12px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="logo">
  IELTS MOCK TEST
</div>

<div class="top">
  <button>Login</button>
  <button>Register</button>
</div>

<div class="hero">
  <div class="box">
    <h1>"Success in IELTS comes from consistent practice."</h1>
    <p>Start your journey and improve your band score today.</p>
  </div>
</div>

<div class="footer">
  Created by Atabek
</div>

</body>
</html>
