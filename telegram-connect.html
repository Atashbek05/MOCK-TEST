<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Telegram Connect – IELTS Mock</title>
<!--
  Telegram Mini App SDK.
  When this page is opened inside Telegram (via WebApp button),
  window.Telegram.WebApp becomes available with the user's info.
  When opened in a normal browser, the script is a harmless no-op.
-->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #f1f5f9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  color: #0f172a;
}

/* ── Top bar ── */
.top-bar {
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  border-bottom: 1px solid #e2e8f0;
}

.logo { font-size: 15px; font-weight: 800; color: #0f172a; text-decoration: none; letter-spacing: -0.2px; }
.logo .accent { color: #2563eb; }

.nav-btn {
  font-size: 13px; font-weight: 600; color: #64748b;
  text-decoration: none; padding: 7px 16px;
  border: 1.5px solid #e2e8f0; border-radius: 10px;
  background: white; cursor: pointer; font-family: inherit;
  transition: color 0.15s, border-color 0.15s;
}
.nav-btn:hover { color: #0f172a; border-color: #cbd5e1; }

/* ── Card ── */
.page-center {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 32px 20px 60px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 36px 32px 28px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 16px 48px rgba(0,0,0,0.09);
}

/* ── Loading ── */
.loading-wrap {
  text-align: center;
  padding: 32px 0;
  color: #6b7280;
  font-size: 14px;
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid #e2e8f0;
  border-top-color: #2563eb;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Section title ── */
.card-title {
  font-size: 22px;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.4px;
  margin-bottom: 6px;
}
.card-sub {
  font-size: 14px;
  color: #64748b;
  line-height: 1.55;
  margin-bottom: 28px;
}

/* ── Connected state ── */
.connected-card {
  background: #f0fdf4;
  border: 1.5px solid #86efac;
  border-radius: 14px;
  padding: 20px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.tg-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2563eb, #06b6d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.connected-info { flex: 1; min-width: 0; }
.connected-name { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 2px; }
.connected-handle { font-size: 13px; color: #059669; }

.connected-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: #dcfce7; color: #15803d;
  font-size: 11px; font-weight: 700;
  padding: 4px 10px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: 0.4px;
  margin-bottom: 16px;
}

/* ── Not connected state ── */
.not-connected-card {
  background: #fffbeb;
  border: 1.5px solid #fde68a;
  border-radius: 14px;
  padding: 20px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
}
.nc-icon { font-size: 28px; flex-shrink: 0; }
.nc-text p { font-size: 14px; color: #92400e; line-height: 1.5; }

/* ── How it works ── */
.how-it-works {
  background: #f8fafc;
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 24px;
}
.how-title { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
.how-step {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 13px;
  color: #374151;
  line-height: 1.45;
}
.how-step:last-child { margin-bottom: 0; }
.how-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #2563eb;
  color: white;
  font-size: 11px;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

/* ── Widget container ── */
.widget-wrap {
  display: flex;
  justify-content: center;
  min-height: 56px;
  margin-bottom: 16px;
}

/* ── Buttons ── */
.btn-unlink {
  width: 100%;
  padding: 13px;
  background: white;
  color: #dc2626;
  border: 1.5px solid #fca5a5;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.btn-unlink:hover { background: #fef2f2; border-color: #f87171; }

.btn-back {
  display: block;
  text-align: center;
  margin-top: 16px;
  font-size: 13px;
  font-weight: 600;
  color: #64748b;
  text-decoration: none;
}
.btn-back:hover { color: #0f172a; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #0f172a; color: white;
  font-size: 14px; font-weight: 600;
  padding: 12px 24px; border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  z-index: 100;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Server error ── */
.server-error {
  display: none;
  background: #fef2f2;
  border: 1.5px solid #fecaca;
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 13px;
  color: #dc2626;
  margin-bottom: 16px;
  text-align: center;
}
.server-error.show { display: block; }

/* ── Telegram not configured ── */
.not-configured {
  background: #f1f5f9;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  padding: 20px;
  text-align: center;
  font-size: 13px;
  color: #64748b;
  line-height: 1.6;
}
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <a class="logo" href="index.html">IELTS <span class="accent">MOCK</span></a>
  <a class="nav-btn" id="back-btn" href="dashboard.html">← Dashboard</a>
</div>

<!-- Card -->
<div class="page-center">
  <div class="card">

    <h1 class="card-title">Telegram Connect</h1>
    <p class="card-sub">
      Link your Telegram account to sign in instantly via the bot
      and receive exam reminders.
    </p>

    <!-- Loading state -->
    <div class="loading-wrap" id="loading-state">
      <div class="spinner"></div>
      Loading…
    </div>

    <!-- Error box -->
    <div class="server-error" id="err-server"></div>

    <!-- Content (rendered by JS after loading) -->
    <div id="content" style="display:none;"></div>

    <a class="btn-back" id="back-link" href="dashboard.html">← Back to Dashboard</a>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="api.js"></script>
<script src="auth.js"></script>
<script>
// ── Require login ─────────────────────────────────────────────────────────────
const token = requireAuth();

// State
let currentUser = null;
let botUsername = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function showToast(msg, isSuccess = true) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = isSuccess ? "#059669" : "#dc2626";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

function showError(msg) {
  const el = document.getElementById("err-server");
  el.textContent = msg;
  el.classList.add("show");
}

function clearError() {
  document.getElementById("err-server").classList.remove("show");
}

// ── Render "connected" UI ─────────────────────────────────────────────────────
function renderConnected(user) {
  const handle = user.telegram_username ? `@${user.telegram_username}` : `ID ${user.telegram_id}`;
  document.getElementById("content").innerHTML = `
    <div class="connected-badge">✅ Connected</div>
    <div class="connected-card">
      <div class="tg-avatar">✈️</div>
      <div class="connected-info">
        <div class="connected-name">${escHtml(user.name)}</div>
        <div class="connected-handle">${escHtml(handle)}</div>
      </div>
    </div>
    <p style="font-size:13px;color:#6b7280;margin-bottom:20px;line-height:1.55;">
      Your Telegram is linked. You can now sign in by clicking
      <strong>Log in with Telegram</strong> on the login page.
    </p>
    <button class="btn-unlink" onclick="unlink()">🔗 Unlink Telegram Account</button>`;
}

// ── Render "not connected" UI ─────────────────────────────────────────────────
function renderNotConnected() {
  let widgetHtml = "";
  if (botUsername) {
    widgetHtml = `
      <div class="how-it-works">
        <div class="how-title">How it works</div>
        <div class="how-step"><span class="how-num">1</span> Click the button below and authorise in Telegram</div>
        <div class="how-step"><span class="how-num">2</span> Your accounts are linked instantly</div>
        <div class="how-step"><span class="how-num">3</span> Next time, log in with one click via Telegram</div>
      </div>
      <div class="not-connected-card">
        <span class="nc-icon">⚠️</span>
        <div class="nc-text"><p>Your Telegram is <strong>not linked</strong> yet. Use the button below to connect it.</p></div>
      </div>
      <div class="widget-wrap" id="tg-widget-wrap"></div>`;
  } else {
    widgetHtml = `
      <div class="not-configured">
        <p>🤖 Telegram integration is not configured on this server yet.<br>
        Contact the administrator to enable it.</p>
      </div>`;
  }
  document.getElementById("content").innerHTML = widgetHtml;

  if (botUsername) loadWidget();
}

// ── Load Telegram Login Widget dynamically ────────────────────────────────────
// Why dynamic? We need the bot username from the backend first.
// The widget script creates an iframe with a "Log in with Telegram" button.
function loadWidget() {
  // Expose the callback globally so Telegram's script can find it
  window.__tgLinkCallback__ = async function(tgUser) {
    await linkAccount(tgUser);
  };

  const container = document.getElementById("tg-widget-wrap");
  if (!container) return;

  const script = document.createElement("script");
  script.src = "https://telegram.org/js/telegram-widget.js?22";
  script.setAttribute("data-telegram-login", botUsername);
  script.setAttribute("data-size", "large");
  script.setAttribute("data-radius", "10");
  script.setAttribute("data-onauth", "__tgLinkCallback__(user)");
  script.setAttribute("data-request-access", "write");
  script.async = true;
  container.appendChild(script);
}

// ── Link account ──────────────────────────────────────────────────────────────
async function linkAccount(tgUser) {
  clearError();
  try {
    const res = await fetch(`${API_BASE}/telegram/link`, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
      body: JSON.stringify(tgUser),
    });
    const data = await res.json();

    if (res.ok) {
      // Update local user object and re-render as connected
      currentUser.telegram_id = data.telegram_id;
      currentUser.telegram_username = data.telegram_username;
      document.getElementById("content").style.display = "block";
      renderConnected(currentUser);
      showToast("✅ Telegram linked successfully!");
    } else {
      showError(data.detail || "Could not link Telegram account.");
      showToast("❌ " + (data.detail || "Link failed"), false);
    }
  } catch {
    showError("Cannot connect to server. Please try again.");
  }
}

// ── Unlink account ────────────────────────────────────────────────────────────
async function unlink() {
  if (!confirm("Unlink your Telegram account? You can re-link it at any time.")) return;
  clearError();
  try {
    const res = await fetch(`${API_BASE}/telegram/unlink`, {
      method: "DELETE",
      headers: { Authorization: `Bearer ${token}` },
    });
    if (res.ok) {
      currentUser.telegram_id = null;
      currentUser.telegram_username = null;
      renderNotConnected();
      showToast("✅ Telegram unlinked.");
    } else {
      const data = await res.json();
      showError(data.detail || "Could not unlink.");
    }
  } catch {
    showError("Cannot connect to server.");
  }
}

function escHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function load() {
  try {
    // Fetch current user and bot info in parallel
    const [meRes, botRes] = await Promise.all([
      fetch(`${API_BASE}/me`,                { headers: { Authorization: `Bearer ${token}` } }),
      fetch(`${API_BASE}/telegram/bot-info`, { headers: { Authorization: `Bearer ${token}` } }),
    ]);

    if (meRes.status === 401) { logout(); return; }
    currentUser = await meRes.json();

    // Teacher → back button goes to teacher dashboard
    if (currentUser.role === "teacher") {
      document.getElementById("back-btn").href  = "teacher-dashboard.html";
      document.getElementById("back-link").href = "teacher-dashboard.html";
    }

    if (botRes.ok) {
      const botData = await botRes.json();
      botUsername = botData.username;
    }

    document.getElementById("loading-state").style.display = "none";
    document.getElementById("content").style.display = "block";

    if (currentUser.telegram_id) {
      renderConnected(currentUser);
    } else {
      renderNotConnected();
    }

    // ── Telegram Mini App detection ──────────────────────────────────────────
    // If this page was opened inside Telegram (via the bot's WebApp button),
    // window.Telegram.WebApp.initDataUnsafe.user contains the Telegram user info.
    // We can use it to pre-fill or auto-link.
    const tgWebApp = window.Telegram?.WebApp;
    if (tgWebApp?.initDataUnsafe?.user && !currentUser.telegram_id) {
      // Page is inside Telegram Mini App and account isn't linked yet
      // Show a helpful hint — user can tap the widget to confirm
      const hint = document.createElement("p");
      hint.style.cssText = "font-size:13px;color:#2563eb;margin-top:12px;text-align:center;font-weight:600;";
      hint.textContent = "📱 Detected: you're inside Telegram. Click the button above to link instantly!";
      document.getElementById("tg-widget-wrap")?.after(hint);
      tgWebApp.ready(); // tells Telegram the Mini App has loaded
    }

  } catch (err) {
    console.error(err);
    document.getElementById("loading-state").innerHTML =
      '<p style="color:#dc2626;font-size:14px;">Cannot connect to server. Please refresh.</p>';
  }
}

load();
</script>
</body>
</html>
