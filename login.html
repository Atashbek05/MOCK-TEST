<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login – IELTS Mock</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #f1f5f9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ─────────────────────────────────────────────────────────────────── */
.top-bar {
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 15px;
  font-weight: 800;
  color: #0f172a;
  text-decoration: none;
  letter-spacing: -0.2px;
}

.logo .accent { color: #2563eb; }

.nav-btn {
  font-size: 14px;
  font-weight: 600;
  color: #64748b;
  text-decoration: none;
  padding: 8px 18px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  background: white;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}

.nav-btn:hover { color: #0f172a; border-color: #cbd5e1; background: #f8fafc; }

/* ── Page center ─────────────────────────────────────────────────────────────── */
.page-center {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* ── Card ────────────────────────────────────────────────────────────────────── */
.card {
  background: white;
  border-radius: 20px;
  padding: 38px 34px 32px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 16px 48px rgba(0,0,0,0.09);
}

.card-title {
  font-size: 26px;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.card-sub {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 30px;
}

/* ── Field (label + input + error) ──────────────────────────────────────────── */
.field { margin-bottom: 18px; }

.field-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #374151;
  margin-bottom: 7px;
}

.field-wrap { position: relative; }

/* The actual input */
.field-input {
  width: 100%;
  padding: 13px 16px;
  font-family: inherit;
  font-size: 15px;
  color: #0f172a;
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}

.field-input::placeholder { color: #94a3b8; }

/* Blue glow on focus — main UX improvement */
.field-input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
  background: white;
}

/* Red glow on error */
.field-input.is-error {
  border-color: #ef4444;
  box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
  animation: shake 0.32s ease;
}

/* Extra right padding when password toggle is present */
.has-toggle { padding-right: 60px; }

/* ── Password show/hide toggle ───────────────────────────────────────────────── */
.pw-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  color: #94a3b8;
  padding: 4px 6px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}

.pw-toggle:hover { color: #374151; background: #f1f5f9; }

/* ── Error text under field ──────────────────────────────────────────────────── */
.field-error {
  display: none;
  font-size: 12px;
  font-weight: 500;
  color: #ef4444;
  margin-top: 6px;
  margin-left: 2px;
}

.field-error.show { display: block; }

/* ── Server / API error box ──────────────────────────────────────────────────── */
.server-error {
  display: none;
  background: #fef2f2;
  border: 1.5px solid #fecaca;
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 13px;
  font-weight: 500;
  color: #dc2626;
  margin-bottom: 16px;
  text-align: center;
}

.server-error.show { display: block; }

/* ── Submit button ───────────────────────────────────────────────────────────── */
.btn-submit {
  width: 100%;
  padding: 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  transition: background 0.2s, transform 0.15s;
  margin-top: 4px;
}

.btn-submit:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-1px); }
.btn-submit:active:not(:disabled) { transform: none; }
.btn-submit:disabled { opacity: 0.68; cursor: not-allowed; }

/* Spinner shown inside button while loading */
.spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2.5px solid rgba(255,255,255,0.35);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  flex-shrink: 0;
}

.btn-submit.loading .spinner { display: block; }

/* ── Switch link ─────────────────────────────────────────────────────────────── */
.switch-link {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #64748b;
}

.switch-link a { color: #2563eb; font-weight: 600; text-decoration: none; }
.switch-link a:hover { text-decoration: underline; }

/* ── Footer ──────────────────────────────────────────────────────────────────── */
.footer { text-align: center; padding: 14px; font-size: 12px; color: #cbd5e1; font-weight: 600; }

/* ── Animations ──────────────────────────────────────────────────────────────── */
/* Shake: fields wiggle left-right when error occurs */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60%  { transform: translateX(-6px); }
  40%, 80%  { transform: translateX(6px); }
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<!-- Top bar -->
<div class="top-bar">
  <a class="logo" href="login.html">IELTS <span class="accent">MOCK</span></a>
  <a class="nav-btn" href="register.html">Create account →</a>
</div>

<!-- Card -->
<div class="page-center">
  <div class="card">

    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Sign in to your IELTS Mock account</p>

    <!-- Email field -->
    <div class="field">
      <label class="field-label" for="email">Email address</label>
      <div class="field-wrap">
        <input
          class="field-input"
          id="email"
          type="email"
          placeholder="name@gmail.com"
          autocomplete="email"
          tabindex="1"
        >
      </div>
      <div class="field-error" id="err-email"></div>
    </div>

    <!-- Password field -->
    <div class="field">
      <label class="field-label" for="password">Password</label>
      <div class="field-wrap">
        <input
          class="field-input has-toggle"
          id="password"
          type="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          tabindex="2"
        >
        <!-- tabindex="-1" keeps Tab from landing on the toggle button -->
        <button class="pw-toggle" id="pw-btn" type="button" tabindex="-1">Show</button>
      </div>
      <div class="field-error" id="err-password"></div>
    </div>

    <!-- Server error (only shown when API returns an error) -->
    <div class="server-error" id="err-server"></div>

    <!-- Submit -->
    <button class="btn-submit" id="submit-btn" tabindex="3">
      <span class="spinner"></span>
      <span class="btn-label">Sign in</span>
    </button>

    <p class="switch-link">
      Don't have an account? <a href="register.html">Register</a>
    </p>

    <!-- ── Telegram Login (code-based) ──────────────────────────────────── -->
    <div id="tg-section" style="display:none;">
      <div style="display:flex;align-items:center;gap:12px;margin:24px 0 16px;">
        <div style="flex:1;height:1px;background:#e2e8f0;"></div>
        <span style="font-size:12px;font-weight:600;color:#94a3b8;">or</span>
        <div style="flex:1;height:1px;background:#e2e8f0;"></div>
      </div>

      <!-- Step 1: button -->
      <div id="tg-step-btn">
        <button type="button" id="tg-login-btn" onclick="startTelegramLogin()"
          style="width:100%;padding:12px;border:1.5px solid #e2e8f0;border-radius:12px;
                 background:#fff;cursor:pointer;font-size:14px;font-weight:600;
                 color:#334155;display:flex;align-items:center;justify-content:center;
                 gap:10px;transition:background .15s,border-color .15s;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
            <circle cx="12" cy="12" r="10" fill="#229ED9"/>
            <path d="M16.93 9.02l-1.69 7.96c-.12.56-.46.7-.93.44l-2.58-1.9-1.24 1.2c-.14.14-.26.26-.53.26l.19-2.67 4.84-4.37c.21-.19-.05-.29-.32-.1L7.62 14.2l-2.54-.79c-.55-.17-.56-.55.12-.82l9.9-3.82c.46-.17.86.11.73.83z" fill="white"/>
          </svg>
          Sign in with Telegram
        </button>
        <p style="font-size:11px;color:#94a3b8;text-align:center;margin:8px 0 0;">
          Requires Telegram linked to your account
        </p>
      </div>

      <!-- Step 2: code + instructions -->
      <div id="tg-step-code" style="display:none;">
        <div style="background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:12px;
                    padding:16px;text-align:center;">
          <p style="font-size:12px;color:#0369a1;margin:0 0 8px;font-weight:600;">
            Open the bot and send this command:
          </p>
          <div id="tg-code-display"
               style="font-size:26px;font-weight:800;letter-spacing:5px;color:#1e40af;
                      font-family:monospace;margin-bottom:10px;">------</div>
          <button type="button" onclick="copyLoginCommand()"
            style="font-size:12px;color:#0369a1;background:none;border:1px solid #bae6fd;
                   border-radius:8px;padding:5px 14px;cursor:pointer;margin-bottom:12px;">
            📋 Copy command
          </button>
          <div>
            <a id="tg-bot-link" href="#" target="_blank"
              style="display:inline-flex;align-items:center;gap:6px;background:#229ED9;
                     color:#fff;border-radius:10px;padding:9px 18px;font-size:13px;
                     font-weight:600;text-decoration:none;">
              Open Telegram Bot ↗
            </a>
          </div>
          <div style="font-size:11px;color:#64748b;margin-top:10px;">
            Expires in <b id="tg-timer-val">5:00</b>
          </div>
        </div>
        <div id="tg-login-waiting"
             style="font-size:13px;color:#64748b;text-align:center;margin-top:10px;">
          ⏳ Waiting for bot confirmation...
        </div>
        <div id="tg-login-err"
             style="display:none;margin-top:10px;padding:10px 14px;background:#fef3c7;
                    border:1.5px solid #fde68a;border-radius:10px;font-size:13px;
                    color:#92400e;text-align:center;"></div>
      </div>
    </div>

  </div>
</div>

<div class="footer">Created by Atabek</div>

<!--
  Telegram Mini App SDK — harmless no-op when opened in a regular browser.
  Activates when the page is opened inside Telegram as a Mini App.
-->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="api.js"></script>
<script>

// ── Already logged in → skip to correct dashboard ────────────────────────────
if (localStorage.getItem("token")) {
  var _role = localStorage.getItem("userRole");
  window.location.replace(_role === "teacher" ? "teacher-dashboard.html" : "dashboard.html");
}

// ── Back-button trap ──────────────────────────────────────────────────────────
// Проблема: после logout в истории браузера остаются страницы
// (dashboard, reading и т.д.). Кнопка "Назад" может на них вернуть.
//
// Решение: pushState добавляет текущий URL в историю ещё раз.
// Когда пользователь нажимает "Назад" — срабатывает popstate,
// и мы снова пушим login.html. Кнопка "Назад" как будто "залипает" на login.
window.history.pushState(null, '', window.location.href);
window.addEventListener('popstate', function () {
  window.history.pushState(null, '', window.location.href);
});

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// Show a red error message under the field + red border + shake animation
function showFieldError(inputId, msgId, message) {
  const input = document.getElementById(inputId);
  const msg   = document.getElementById(msgId);

  // Remove then re-add class so the shake animation restarts every time
  input.classList.remove("is-error");
  void input.offsetWidth; // force browser reflow — makes animation restart
  input.classList.add("is-error");

  msg.textContent = "⚠ " + message;
  msg.classList.add("show");
}

// Remove red state from a single field
function clearFieldError(inputId, msgId) {
  if (inputId) document.getElementById(inputId).classList.remove("is-error");
  if (msgId)   document.getElementById(msgId).classList.remove("show");
}

// Clear ALL errors at once (called before every submit attempt)
function clearAll() {
  clearFieldError("email",    "err-email");
  clearFieldError("password", "err-password");
  document.getElementById("err-server").classList.remove("show");
}

// Show / hide loading spinner on the submit button
function setLoading(on) {
  const btn = document.getElementById("submit-btn");
  btn.disabled = on;
  btn.classList.toggle("loading", on);
  btn.querySelector(".btn-label").textContent = on ? "Signing in…" : "Sign in";
}

// ═══════════════════════════════════════════════════════════════════════════════
// PASSWORD SHOW / HIDE TOGGLE
// ═══════════════════════════════════════════════════════════════════════════════

document.getElementById("pw-btn").addEventListener("click", function () {
  const inp    = document.getElementById("password");
  const isHide = inp.type === "password";

  inp.type      = isHide ? "text" : "password";
  this.textContent = isHide ? "Hide" : "Show";

  inp.focus(); // keep keyboard focus on the input, not the button
});

// ═══════════════════════════════════════════════════════════════════════════════
// LOGIN FUNCTION  (same logic as before, + loading state)
// ═══════════════════════════════════════════════════════════════════════════════

async function login() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  clearAll(); // wipe previous errors before validating fresh

  let hasError = false;

  if (!email) {
    showFieldError("email", "err-email", "Please enter your email");
    hasError = true;
  } else if (!isValidEmail(email)) {
    showFieldError("email", "err-email", "Invalid email — e.g. name@gmail.com");
    hasError = true;
  }

  if (!password) {
    showFieldError("password", "err-password", "Please enter your password");
    hasError = true;
  }

  if (hasError) return;

  setLoading(true); // show spinner, disable button

  try {
    const res  = await fetch(`${API_BASE}/login`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      const box    = document.getElementById("err-server");
      box.textContent = data.detail || "Wrong email or password";
      box.classList.add("show");
      setLoading(false);
      return;
    }

    localStorage.setItem("token", data.access_token);

    // Fetch user role from /me, then redirect to the correct dashboard
    try {
      const meRes  = await fetch(`${API_BASE}/me`, {
        headers: { Authorization: `Bearer ${data.access_token}` }
      });
      const meData = await meRes.json();
      const role   = meData.role || "student";
      localStorage.setItem("userRole", role);
      localStorage.setItem("userName", meData.name || "");
      window.location.href = role === "teacher" ? "teacher-dashboard.html" : "dashboard.html";
    } catch {
      localStorage.setItem("userRole", "student");
      window.location.href = "dashboard.html";
    }

  } catch (err) {
    const box    = document.getElementById("err-server");
    box.textContent = "Server is not responding. Please try again.";
    box.classList.add("show");
    setLoading(false);
    console.error(err);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// KEYBOARD NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════════

// Enter on Email → move focus to Password
document.getElementById("email").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    e.preventDefault();
    document.getElementById("password").focus();
  }
});

// Enter on Password → submit the form
document.getElementById("password").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    e.preventDefault();
    login();
  }
});

// Submit button click
document.getElementById("submit-btn").addEventListener("click", login);

// ═══════════════════════════════════════════════════════════════════════════════
// REAL-TIME ERROR CLEARING
// As soon as the user starts typing again, the red border disappears.
// This gives instant positive feedback that the field is being corrected.
// ═══════════════════════════════════════════════════════════════════════════════

document.getElementById("email").addEventListener("input", function () {
  clearFieldError("email", "err-email");
  document.getElementById("err-server").classList.remove("show");
});

document.getElementById("password").addEventListener("input", function () {
  clearFieldError("password", "err-password");
  document.getElementById("err-server").classList.remove("show");
});

// ── Auto-focus the first field when the page loads ────────────────────────────
document.getElementById("email").focus();

// ── Telegram Login (code-based) ───────────────────────────────────────────────
let _tgLoginCode = null;
let _tgLoginPoll = null;
let _tgLoginTimer = null;
let _tgLoginSecondsLeft = 300;
let _tgBotUsername = null;

(async function initTelegramLogin() {
  try {
    const res = await fetch(`${API_BASE}/telegram/bot-info`);
    if (!res.ok) return;
    const { username } = await res.json();
    _tgBotUsername = username;
    document.getElementById("tg-section").style.display = "block";
  } catch (e) {}
})();

async function startTelegramLogin() {
  const btn = document.getElementById("tg-login-btn");
  btn.disabled = true;
  btn.style.opacity = "0.6";

  try {
    const res = await fetch(`${API_BASE}/telegram/login-code`, { method: "POST" });
    if (!res.ok) throw new Error("Server error");
    const data = await res.json();
    _tgLoginCode = data.code;
    _tgLoginSecondsLeft = data.expires_in_seconds || 300;

    // Set bot deep-link
    const botLink = document.getElementById("tg-bot-link");
    botLink.href = _tgBotUsername
      ? `https://t.me/${_tgBotUsername}`
      : "https://t.me/";

    document.getElementById("tg-code-display").textContent = _tgLoginCode;
    document.getElementById("tg-step-btn").style.display = "none";
    document.getElementById("tg-step-code").style.display = "block";

    // Countdown timer
    _tgLoginTimer = setInterval(() => {
      _tgLoginSecondsLeft--;
      const m = Math.floor(_tgLoginSecondsLeft / 60);
      const s = _tgLoginSecondsLeft % 60;
      const timerEl = document.getElementById("tg-timer-val");
      timerEl.textContent = `${m}:${s.toString().padStart(2, "0")}`;
      if (_tgLoginSecondsLeft <= 60) timerEl.style.color = "#ef4444";
      if (_tgLoginSecondsLeft <= 0) {
        clearInterval(_tgLoginTimer);
        clearInterval(_tgLoginPoll);
        document.getElementById("tg-login-waiting").textContent =
          "⏰ Code expired. Refresh the page to try again.";
      }
    }, 1000);

    // Poll for bot confirmation
    _tgLoginPoll = setInterval(async () => {
      try {
        const r = await fetch(`${API_BASE}/telegram/login-status?code=${_tgLoginCode}`);
        if (!r.ok) return;
        const d = await r.json();

        if (d.expired) {
          clearInterval(_tgLoginPoll);
          clearInterval(_tgLoginTimer);
          document.getElementById("tg-login-waiting").textContent =
            "⏰ Code expired. Refresh the page to try again.";
          return;
        }

        if (d.verified) {
          clearInterval(_tgLoginPoll);
          clearInterval(_tgLoginTimer);
          document.getElementById("tg-login-waiting").textContent = "✅ Verified! Logging you in...";

          const ex = await fetch(`${API_BASE}/telegram/login-exchange`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code: _tgLoginCode }),
          });
          if (!ex.ok) {
            const err = await ex.json();
            const errEl = document.getElementById("tg-login-err");
            errEl.textContent = err.detail || "Login failed. Please try again.";
            errEl.style.display = "block";
            return;
          }
          const jwt = await ex.json();
          localStorage.setItem("token", jwt.token);
          localStorage.setItem("userRole", jwt.role || "student");
          localStorage.setItem("userName", jwt.name || "");
          window.location.href = jwt.role === "teacher"
            ? "teacher-dashboard.html"
            : "dashboard.html";
        }
      } catch (e) {}
    }, 3000);

  } catch (e) {
    btn.disabled = false;
    btn.style.opacity = "1";
    const errEl = document.getElementById("tg-login-err");
    errEl.textContent = "Failed to generate code. Please try again.";
    errEl.style.display = "block";
  }
}

function copyLoginCommand() {
  if (!_tgLoginCode) return;
  navigator.clipboard.writeText(`/login ${_tgLoginCode}`).then(() => {
    const btn = event.currentTarget;
    const orig = btn.textContent;
    btn.textContent = "✅ Copied!";
    setTimeout(() => btn.textContent = orig, 1500);
  }).catch(() => {});
}

</script>
</body>
</html>
