<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login – IELTS Mock</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #f1f5f9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ─────────────────────────────────────────────────────────────────── */
.top-bar {
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 15px;
  font-weight: 800;
  color: #0f172a;
  text-decoration: none;
  letter-spacing: -0.2px;
}

.logo .accent { color: #2563eb; }

.nav-btn {
  font-size: 14px;
  font-weight: 600;
  color: #64748b;
  text-decoration: none;
  padding: 8px 18px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  background: white;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}

.nav-btn:hover { color: #0f172a; border-color: #cbd5e1; background: #f8fafc; }

/* ── Page center ─────────────────────────────────────────────────────────────── */
.page-center {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* ── Card ────────────────────────────────────────────────────────────────────── */
.card {
  background: white;
  border-radius: 20px;
  padding: 38px 34px 32px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 16px 48px rgba(0,0,0,0.09);
}

.card-title {
  font-size: 26px;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.card-sub {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 30px;
}

/* ── Field (label + input + error) ──────────────────────────────────────────── */
.field { margin-bottom: 18px; }

.field-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #374151;
  margin-bottom: 7px;
}

.field-wrap { position: relative; }

/* The actual input */
.field-input {
  width: 100%;
  padding: 13px 16px;
  font-family: inherit;
  font-size: 15px;
  color: #0f172a;
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}

.field-input::placeholder { color: #94a3b8; }

/* Blue glow on focus — main UX improvement */
.field-input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
  background: white;
}

/* Red glow on error */
.field-input.is-error {
  border-color: #ef4444;
  box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
  animation: shake 0.32s ease;
}

/* Extra right padding when password toggle is present */
.has-toggle { padding-right: 60px; }

/* ── Password show/hide toggle ───────────────────────────────────────────────── */
.pw-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  color: #94a3b8;
  padding: 4px 6px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}

.pw-toggle:hover { color: #374151; background: #f1f5f9; }

/* ── Error text under field ──────────────────────────────────────────────────── */
.field-error {
  display: none;
  font-size: 12px;
  font-weight: 500;
  color: #ef4444;
  margin-top: 6px;
  margin-left: 2px;
}

.field-error.show { display: block; }

/* ── Server / API error box ──────────────────────────────────────────────────── */
.server-error {
  display: none;
  background: #fef2f2;
  border: 1.5px solid #fecaca;
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 13px;
  font-weight: 500;
  color: #dc2626;
  margin-bottom: 16px;
  text-align: center;
}

.server-error.show { display: block; }

/* ── Submit button ───────────────────────────────────────────────────────────── */
.btn-submit {
  width: 100%;
  padding: 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  transition: background 0.2s, transform 0.15s;
  margin-top: 4px;
}

.btn-submit:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-1px); }
.btn-submit:active:not(:disabled) { transform: none; }
.btn-submit:disabled { opacity: 0.68; cursor: not-allowed; }

/* Spinner shown inside button while loading */
.spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2.5px solid rgba(255,255,255,0.35);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  flex-shrink: 0;
}

.btn-submit.loading .spinner { display: block; }

/* ── Switch link ─────────────────────────────────────────────────────────────── */
.switch-link {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #64748b;
}

.switch-link a { color: #2563eb; font-weight: 600; text-decoration: none; }
.switch-link a:hover { text-decoration: underline; }

/* ── Footer ──────────────────────────────────────────────────────────────────── */
.footer { text-align: center; padding: 14px; font-size: 12px; color: #cbd5e1; font-weight: 600; }

/* ── Animations ──────────────────────────────────────────────────────────────── */
/* Shake: fields wiggle left-right when error occurs */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60%  { transform: translateX(-6px); }
  40%, 80%  { transform: translateX(6px); }
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<!-- Top bar -->
<div class="top-bar">
  <a class="logo" href="login.html">IELTS <span class="accent">MOCK</span></a>
  <a class="nav-btn" href="register.html">Create account →</a>
</div>

<!-- Card -->
<div class="page-center">
  <div class="card">

    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Sign in to your IELTS Mock account</p>

    <!-- Email field -->
    <div class="field">
      <label class="field-label" for="email">Email address</label>
      <div class="field-wrap">
        <input
          class="field-input"
          id="email"
          type="email"
          placeholder="name@gmail.com"
          autocomplete="email"
          tabindex="1"
        >
      </div>
      <div class="field-error" id="err-email"></div>
    </div>

    <!-- Password field -->
    <div class="field">
      <label class="field-label" for="password">Password</label>
      <div class="field-wrap">
        <input
          class="field-input has-toggle"
          id="password"
          type="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          tabindex="2"
        >
        <!-- tabindex="-1" keeps Tab from landing on the toggle button -->
        <button class="pw-toggle" id="pw-btn" type="button" tabindex="-1">Show</button>
      </div>
      <div class="field-error" id="err-password"></div>
    </div>

    <!-- Server error (only shown when API returns an error) -->
    <div class="server-error" id="err-server"></div>

    <!-- Submit -->
    <button class="btn-submit" id="submit-btn" tabindex="3">
      <span class="spinner"></span>
      <span class="btn-label">Sign in</span>
    </button>

    <p class="switch-link">
      Don't have an account? <a href="register.html">Register</a>
    </p>

  </div>
</div>

<div class="footer">Created by Atabek</div>

<script src="api.js"></script>
<script>

// ── Already logged in → skip to dashboard ─────────────────────────────────────
if (localStorage.getItem("token")) {
  window.location.replace("dashboard.html");
}

// ── Back-button trap ──────────────────────────────────────────────────────────
// Проблема: после logout в истории браузера остаются страницы
// (dashboard, reading и т.д.). Кнопка "Назад" может на них вернуть.
//
// Решение: pushState добавляет текущий URL в историю ещё раз.
// Когда пользователь нажимает "Назад" — срабатывает popstate,
// и мы снова пушим login.html. Кнопка "Назад" как будто "залипает" на login.
window.history.pushState(null, '', window.location.href);
window.addEventListener('popstate', function () {
  window.history.pushState(null, '', window.location.href);
});

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// Show a red error message under the field + red border + shake animation
function showFieldError(inputId, msgId, message) {
  const input = document.getElementById(inputId);
  const msg   = document.getElementById(msgId);

  // Remove then re-add class so the shake animation restarts every time
  input.classList.remove("is-error");
  void input.offsetWidth; // force browser reflow — makes animation restart
  input.classList.add("is-error");

  msg.textContent = "⚠ " + message;
  msg.classList.add("show");
}

// Remove red state from a single field
function clearFieldError(inputId, msgId) {
  if (inputId) document.getElementById(inputId).classList.remove("is-error");
  if (msgId)   document.getElementById(msgId).classList.remove("show");
}

// Clear ALL errors at once (called before every submit attempt)
function clearAll() {
  clearFieldError("email",    "err-email");
  clearFieldError("password", "err-password");
  document.getElementById("err-server").classList.remove("show");
}

// Show / hide loading spinner on the submit button
function setLoading(on) {
  const btn = document.getElementById("submit-btn");
  btn.disabled = on;
  btn.classList.toggle("loading", on);
  btn.querySelector(".btn-label").textContent = on ? "Signing in…" : "Sign in";
}

// ═══════════════════════════════════════════════════════════════════════════════
// PASSWORD SHOW / HIDE TOGGLE
// ═══════════════════════════════════════════════════════════════════════════════

document.getElementById("pw-btn").addEventListener("click", function () {
  const inp    = document.getElementById("password");
  const isHide = inp.type === "password";

  inp.type      = isHide ? "text" : "password";
  this.textContent = isHide ? "Hide" : "Show";

  inp.focus(); // keep keyboard focus on the input, not the button
});

// ═══════════════════════════════════════════════════════════════════════════════
// LOGIN FUNCTION  (same logic as before, + loading state)
// ═══════════════════════════════════════════════════════════════════════════════

async function login() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  clearAll(); // wipe previous errors before validating fresh

  let hasError = false;

  if (!email) {
    showFieldError("email", "err-email", "Please enter your email");
    hasError = true;
  } else if (!isValidEmail(email)) {
    showFieldError("email", "err-email", "Invalid email — e.g. name@gmail.com");
    hasError = true;
  }

  if (!password) {
    showFieldError("password", "err-password", "Please enter your password");
    hasError = true;
  }

  if (hasError) return;

  setLoading(true); // show spinner, disable button

  try {
    const res  = await fetch(`${API_BASE}/login`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      const box    = document.getElementById("err-server");
      box.textContent = data.detail || "Wrong email or password";
      box.classList.add("show");
      setLoading(false);
      return;
    }

    localStorage.setItem("token", data.access_token);
    window.location.href = "dashboard.html";

  } catch (err) {
    const box    = document.getElementById("err-server");
    box.textContent = "Server is not responding. Please try again.";
    box.classList.add("show");
    setLoading(false);
    console.error(err);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// KEYBOARD NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════════

// Enter on Email → move focus to Password
document.getElementById("email").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    e.preventDefault();
    document.getElementById("password").focus();
  }
});

// Enter on Password → submit the form
document.getElementById("password").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    e.preventDefault();
    login();
  }
});

// Submit button click
document.getElementById("submit-btn").addEventListener("click", login);

// ═══════════════════════════════════════════════════════════════════════════════
// REAL-TIME ERROR CLEARING
// As soon as the user starts typing again, the red border disappears.
// This gives instant positive feedback that the field is being corrected.
// ═══════════════════════════════════════════════════════════════════════════════

document.getElementById("email").addEventListener("input", function () {
  clearFieldError("email", "err-email");
  document.getElementById("err-server").classList.remove("show");
});

document.getElementById("password").addEventListener("input", function () {
  clearFieldError("password", "err-password");
  document.getElementById("err-server").classList.remove("show");
});

// ── Auto-focus the first field when the page loads ────────────────────────────
document.getElementById("email").focus();

</script>
</body>
</html>
