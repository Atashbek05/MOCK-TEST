<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  font-weight: bold;
  font-size: 20px;
}

.top {
  position: absolute;
  top: 20px;
  right: 20px;
}

.top button {
  margin-left: 10px;
  padding: 10px 18px;
  background: black;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

.box h2 {
  margin-bottom: 20px;
}

.box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 25px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 14px;
}

.box input:focus {
  border: 1px solid black;
}

.box input.error {
  border: 1px solid #e53935;
}

.error-msg {
  display: none;
  color: #e53935;
  font-size: 12px;
  margin: -6px 0 4px 12px;
  text-align: left;
}

.error-msg.show {
  display: block;
}

.box button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin-top: 10px;
}

.footer {
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="logo">IELTS MOCK TEST</div>

<div class="top">
  <button onclick="goRegister()">Register</button>
</div>

<div class="hero">
  <div class="box">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <small class="error-msg" id="err-email">Please enter your email</small>

    <input id="password" type="password" placeholder="Password">
    <small class="error-msg" id="err-password">Please enter your password</small>

    <small class="error-msg" id="err-server"></small>
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="footer">Created by Atabek</div>

<script src="api.js"></script>
<script>
function goRegister() {
  window.location.href = "register.html";
}

function showError(id, inputId, message) {
  const el = document.getElementById(id);
  el.textContent = message;
  el.classList.add("show");
  if (inputId) document.getElementById(inputId).classList.add("error");
}

function clearError(id, inputId) {
  document.getElementById(id).classList.remove("show");
  if (inputId) document.getElementById(inputId).classList.remove("error");
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  clearError("err-email", "email");
  clearError("err-password", "password");
  clearError("err-server", null);

  let hasError = false;

  if (!email) {
    showError("err-email", "email", "Please enter your email");
    hasError = true;
  } else if (!isValidEmail(email)) {
    showError("err-email", "email", "Please enter a valid email (e.g. name@gmail.com)");
    hasError = true;
  }

  if (!password) {
    showError("err-password", "password", "Please enter your password");
    hasError = true;
  }

  if (hasError) return;

  try {
    const res = await fetch(`${API_BASE}/login`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    if (!res.ok) {
      showError("err-server", null, data.detail || "Wrong email or password");
      return;
    }

    localStorage.setItem("token", data.access_token);
    window.location.href = "dashboard.html";
  } catch (err) {
    showError("err-server", null, "Server is not responding. Please try again.");
    console.error(err);
  }
}
</script>
</body>
</html>
