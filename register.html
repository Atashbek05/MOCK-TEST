<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  font-weight: bold;
  font-size: 20px;
}

/* TOP */
.top {
  position: absolute;
  top: 20px;
  right: 20px;
}

.top button {
  padding: 10px 18px;
  background: black;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BOX */
.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

.box h2 {
  margin-bottom: 20px;
}

.box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 25px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 14px;
}

.box input:focus {
  border: 1px solid black;
}

.box button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin-top: 10px;
}

.footer {
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="logo">IELTS MOCK TEST</div>

<div class="top">
  <button onclick="goLogin()">Login</button>
</div>

<div class="hero">
  <div class="box">
    <h2>Register</h2>

    <input placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Register</button>
  </div>
</div>

<div class="footer">Created by Atabek</div>

<script>
function goLogin() {
  window.location.href = "login.html";
}
</script>

</body>
</html>
