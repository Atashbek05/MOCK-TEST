<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

/* LOGO */
.logo {
  position: absolute;
  top: 20px;
  left: 20px;
  font-weight: bold;
  font-size: 20px;
}

/* TOP */
.top {
  position: absolute;
  top: 20px;
  right: 20px;
}

.top button {
  padding: 10px 18px;
  background: black;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BOX */
.box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
}

.box h2 {
  margin-bottom: 20px;
}

.box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 25px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 14px;
}

.box input:focus {
  border: 1px solid black;
}

.box button {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin-top: 10px;
}

.footer {
  position: fixed;
  bottom: 10px;
  right: 15px;
  font-size: 12px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="logo">IELTS MOCK TEST</div>

<div class="top">
  <button onclick="goLogin()">Login</button>
</div>

<div class="hero">
  <div class="box">
    <h2>Register</h2>

    <input id="name" placeholder="Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="register()">Register</button>
  </div>
</div>

<div class="footer">Created by Atabek</div>

<script>
function goLogin() {
  window.location.href = "login.html";
}
</script>
<script>
function register() {
  let username = document.querySelector("input").value;

  if (username === "") {
    alert("Enter username");
    return;
  }

  localStorage.setItem("currentUser", username);

  window.location.href = "dashboard.html";
}
</script>
<script>
const API_BASE = "https://YOUR-BACKEND-URL.onrender.com"; // <-- замени

function goLogin() {
  window.location.href = "login.html";
}

async function register() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!name || !email || !password) {
    alert("Fill all fields");
    return;
  }

  const res = await fetch(`${API_BASE}/register`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, email, password })
  });

  const data = await res.json();
  if (!res.ok) {
    alert(data.detail || "Register failed");
    return;
  }

  localStorage.setItem("token", data.access_token);
  window.location.href = "dashboard.html";
}
</script>
</body>
</html>
