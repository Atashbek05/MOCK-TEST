<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register – IELTS Mock</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #f1f5f9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ─────────────────────────────────────────────────────────────────── */
.top-bar {
  padding: 16px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 15px;
  font-weight: 800;
  color: #0f172a;
  text-decoration: none;
  letter-spacing: -0.2px;
}

.logo .accent { color: #2563eb; }

.nav-btn {
  font-size: 14px;
  font-weight: 600;
  color: #64748b;
  text-decoration: none;
  padding: 8px 18px;
  border: 1.5px solid #e2e8f0;
  border-radius: 10px;
  background: white;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
}

.nav-btn:hover { color: #0f172a; border-color: #cbd5e1; background: #f8fafc; }

/* ── Page center ─────────────────────────────────────────────────────────────── */
.page-center {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* ── Card ────────────────────────────────────────────────────────────────────── */
.card {
  background: white;
  border-radius: 20px;
  padding: 38px 34px 32px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 16px 48px rgba(0,0,0,0.09);
}

.card-title {
  font-size: 26px;
  font-weight: 800;
  color: #0f172a;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.card-sub {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 30px;
}

/* ── Field (label + input + error) ──────────────────────────────────────────── */
.field { margin-bottom: 18px; }

.field-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #374151;
  margin-bottom: 7px;
}

.field-wrap { position: relative; }

/* The actual input */
.field-input {
  width: 100%;
  padding: 13px 16px;
  font-family: inherit;
  font-size: 15px;
  color: #0f172a;
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}

.field-input::placeholder { color: #94a3b8; }

/* Blue glow on focus */
.field-input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
  background: white;
}

/* Red glow + shake on error */
.field-input.is-error {
  border-color: #ef4444;
  box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
  animation: shake 0.32s ease;
}

/* Extra right padding when password toggle is present */
.has-toggle { padding-right: 60px; }

/* ── Password show/hide toggle ───────────────────────────────────────────────── */
.pw-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  color: #94a3b8;
  padding: 4px 6px;
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  line-height: 1;
}

.pw-toggle:hover { color: #374151; background: #f1f5f9; }

/* ── Error text under field ──────────────────────────────────────────────────── */
.field-error {
  display: none;
  font-size: 12px;
  font-weight: 500;
  color: #ef4444;
  margin-top: 6px;
  margin-left: 2px;
}

.field-error.show { display: block; }

/* ── Server / API error box ──────────────────────────────────────────────────── */
.server-error {
  display: none;
  background: #fef2f2;
  border: 1.5px solid #fecaca;
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 13px;
  font-weight: 500;
  color: #dc2626;
  margin-bottom: 16px;
  text-align: center;
}

.server-error.show { display: block; }

/* ── Submit button ───────────────────────────────────────────────────────────── */
.btn-submit {
  width: 100%;
  padding: 14px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  transition: background 0.2s, transform 0.15s;
  margin-top: 4px;
}

.btn-submit:hover:not(:disabled) { background: #1d4ed8; transform: translateY(-1px); }
.btn-submit:active:not(:disabled) { transform: none; }
.btn-submit:disabled { opacity: 0.68; cursor: not-allowed; }

/* Spinner shown inside button while loading */
.spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2.5px solid rgba(255,255,255,0.35);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  flex-shrink: 0;
}

.btn-submit.loading .spinner { display: block; }

/* ── Switch link ─────────────────────────────────────────────────────────────── */
.switch-link {
  text-align: center;
  margin-top: 20px;
  font-size: 14px;
  color: #64748b;
}

.switch-link a { color: #2563eb; font-weight: 600; text-decoration: none; }
.switch-link a:hover { text-decoration: underline; }

/* ── Footer ──────────────────────────────────────────────────────────────────── */
.footer { text-align: center; padding: 14px; font-size: 12px; color: #cbd5e1; font-weight: 600; }

/* ── Role selector ───────────────────────────────────────────────────────────── */
.role-selector {
  display: flex;
  gap: 10px;
  margin-top: 2px;
}

.role-btn {
  flex: 1;
  padding: 16px 10px 13px;
  background: #f8fafc;
  border: 2px solid #e2e8f0;
  border-radius: 14px;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  font-family: inherit;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
}

.role-btn:hover { border-color: #93c5fd; background: #f0f9ff; transform: translateY(-1px); }

.role-btn.active {
  border-color: #2563eb;
  background: #eff6ff;
  box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
}

.role-icon {
  width: 48px; height: 48px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
#role-student .role-icon { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
#role-teacher .role-icon { background: linear-gradient(135deg, #059669, #0d9488); }

.role-name  { font-size: 14px; font-weight: 700; color: #0f172a; }
.role-desc  { font-size: 11px; color: #94a3b8; }

/* ── Animations ──────────────────────────────────────────────────────────────── */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60%  { transform: translateX(-6px); }
  40%, 80%  { transform: translateX(6px); }
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<!-- Top bar -->
<div class="top-bar">
  <a class="logo" href="login.html">IELTS <span class="accent">MOCK</span></a>
  <a class="nav-btn" href="login.html">← Sign in</a>
</div>

<!-- Card -->
<div class="page-center">
  <div class="card">

    <h1 class="card-title">Create account</h1>
    <p class="card-sub">Join IELTS Mock and start practicing today</p>

    <!-- Role selector -->
    <div class="field">
      <label class="field-label">I am a</label>
      <div class="role-selector">
        <button type="button" class="role-btn active" id="role-student" onclick="selectRole('student')">
          <span class="role-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 4L3 9l9 5 9-5-9-5z" fill="white"/>
              <path d="M6.5 11.5v4c0 1.9 2.5 3.2 5.5 3.2s5.5-1.3 5.5-3.2v-4" stroke="white" stroke-width="1.7" stroke-linecap="round" fill="none"/>
              <line x1="19.5" y1="9" x2="19.5" y2="16" stroke="white" stroke-width="1.7" stroke-linecap="round"/>
              <circle cx="19.5" cy="16.8" r="1.3" fill="white"/>
            </svg>
          </span>
          <span class="role-name">Student</span>
          <span class="role-desc">Take IELTS mock tests</span>
        </button>
        <button type="button" class="role-btn" id="role-teacher" onclick="selectRole('teacher')">
          <span class="role-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="9" cy="7" r="3" fill="white"/>
              <path d="M2 20c0-3.9 3.1-7 7-7 1.6 0 3.1.5 4.3 1.4" stroke="white" stroke-width="1.7" stroke-linecap="round" fill="none"/>
              <rect x="13.5" y="10" width="8" height="9.5" rx="1.5" stroke="white" stroke-width="1.6" fill="none"/>
              <line x1="15.5" y1="13" x2="19.5" y2="13" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="15.5" y1="15.5" x2="19.5" y2="15.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
              <line x1="15.5" y1="18" x2="18" y2="18" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="role-name">Teacher</span>
          <span class="role-desc">Manage students & tests</span>
        </button>
      </div>
    </div>

    <!-- Name field -->
    <div class="field">
      <label class="field-label" for="name">Full name</label>
      <div class="field-wrap">
        <input
          class="field-input"
          id="name"
          type="text"
          placeholder="Your name"
          autocomplete="name"
          tabindex="1"
        >
      </div>
      <div class="field-error" id="err-name"></div>
    </div>

    <!-- Email field -->
    <div class="field">
      <label class="field-label" for="email">Email address</label>
      <div class="field-wrap">
        <input
          class="field-input"
          id="email"
          type="email"
          placeholder="name@gmail.com"
          autocomplete="email"
          tabindex="2"
        >
      </div>
      <div class="field-error" id="err-email"></div>
    </div>

    <!-- Password field -->
    <div class="field">
      <label class="field-label" for="password">Password</label>
      <div class="field-wrap">
        <input
          class="field-input has-toggle"
          id="password"
          type="password"
          placeholder="Create a password"
          autocomplete="new-password"
          tabindex="3"
        >
        <!-- tabindex="-1" so Tab skips the toggle and goes straight to Submit -->
        <button class="pw-toggle" id="pw-btn" type="button" tabindex="-1">Show</button>
      </div>
      <div class="field-error" id="err-password"></div>
    </div>

    <!-- Server error (only shown on API failure) -->
    <div class="server-error" id="err-server"></div>

    <!-- Submit -->
    <button class="btn-submit" id="submit-btn" tabindex="4">
      <span class="spinner"></span>
      <span class="btn-label">Create account</span>
    </button>

    <p class="switch-link">
      Already have an account? <a href="login.html">Sign in</a>
    </p>

  </div>
</div>

<div class="footer">Created by Atabek</div>

<script src="api.js"></script>
<script>

// ── Role selection ────────────────────────────────────────────────────────────
var selectedRole = "student";

function selectRole(role) {
  selectedRole = role;
  document.getElementById("role-student").classList.toggle("active", role === "student");
  document.getElementById("role-teacher").classList.toggle("active", role === "teacher");
}

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// Show red border + shake animation + error text under the field
function showFieldError(inputId, msgId, message) {
  const input = document.getElementById(inputId);
  const msg   = document.getElementById(msgId);

  // Remove then re-add → restarts the shake animation every time
  input.classList.remove("is-error");
  void input.offsetWidth; // force browser reflow so animation restarts
  input.classList.add("is-error");

  msg.textContent = "⚠ " + message;
  msg.classList.add("show");
}

// Remove red state from one field
function clearFieldError(inputId, msgId) {
  if (inputId) document.getElementById(inputId).classList.remove("is-error");
  if (msgId)   document.getElementById(msgId).classList.remove("show");
}

// Clear ALL field errors + server error before each submit attempt
function clearAll() {
  clearFieldError("name",     "err-name");
  clearFieldError("email",    "err-email");
  clearFieldError("password", "err-password");
  document.getElementById("err-server").classList.remove("show");
}

// Show / hide loading spinner and disable the button while waiting
function setLoading(on) {
  const btn = document.getElementById("submit-btn");
  btn.disabled = on;
  btn.classList.toggle("loading", on);
  btn.querySelector(".btn-label").textContent = on ? "Creating account…" : "Create account";
}

// ═══════════════════════════════════════════════════════════════════════════════
// PASSWORD SHOW / HIDE TOGGLE
// ═══════════════════════════════════════════════════════════════════════════════

document.getElementById("pw-btn").addEventListener("click", function () {
  const inp    = document.getElementById("password");
  const isHide = inp.type === "password";

  inp.type         = isHide ? "text" : "password";
  this.textContent = isHide ? "Hide" : "Show";

  inp.focus(); // keep keyboard focus on the input after clicking
});

// ═══════════════════════════════════════════════════════════════════════════════
// REGISTER FUNCTION  (same logic as before, + loading state + try/catch)
// ═══════════════════════════════════════════════════════════════════════════════

async function register() {
  const name     = document.getElementById("name").value.trim();
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  clearAll(); // wipe previous errors before validating fresh

  let hasError = false;

  if (!name) {
    showFieldError("name", "err-name", "Please enter your name");
    hasError = true;
  }

  if (!email) {
    showFieldError("email", "err-email", "Please enter your email");
    hasError = true;
  } else if (!isValidEmail(email)) {
    showFieldError("email", "err-email", "Invalid email — e.g. name@gmail.com");
    hasError = true;
  }

  if (!password) {
    showFieldError("password", "err-password", "Please enter a password");
    hasError = true;
  }

  if (hasError) {
    // Focus the first field that has an error
    if (!name)                    document.getElementById("name").focus();
    else if (!email || !isValidEmail(email)) document.getElementById("email").focus();
    else                          document.getElementById("password").focus();
    return;
  }

  setLoading(true); // show spinner, disable button

  try {
    const res  = await fetch(`${API_BASE}/register`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ name, email, password, role: selectedRole })
    });

    const data = await res.json();

    if (!res.ok) {
      const box    = document.getElementById("err-server");
      box.textContent = data.detail || "Registration failed. Please try again.";
      box.classList.add("show");
      setLoading(false);
      return;
    }

    localStorage.setItem("token", data.access_token);
    localStorage.setItem("userRole", selectedRole);
    localStorage.setItem("userName", name);
    window.location.href = selectedRole === "teacher" ? "teacher-dashboard.html" : "dashboard.html";

  } catch (err) {
    const box    = document.getElementById("err-server");
    box.textContent = "Server is not responding. Please try again.";
    box.classList.add("show");
    setLoading(false);
    console.error(err);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// KEYBOARD NAVIGATION
// Flow: Name → Email → Password → Submit
// Tab is handled automatically by the browser (tabindex 1 → 2 → 3 → 4).
// Enter moves to the next field, or submits from the last field.
// ═══════════════════════════════════════════════════════════════════════════════

document.getElementById("name").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    e.preventDefault();
    document.getElementById("email").focus(); // jump to email
  }
});

document.getElementById("email").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    e.preventDefault();
    document.getElementById("password").focus(); // jump to password
  }
});

document.getElementById("password").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    e.preventDefault();
    register(); // submit from last field
  }
});

// Submit button click
document.getElementById("submit-btn").addEventListener("click", register);

// ═══════════════════════════════════════════════════════════════════════════════
// REAL-TIME ERROR CLEARING
// Red border and message disappear as soon as the user starts typing.
// ═══════════════════════════════════════════════════════════════════════════════

document.getElementById("name").addEventListener("input", function () {
  clearFieldError("name", "err-name");
});

document.getElementById("email").addEventListener("input", function () {
  clearFieldError("email", "err-email");
  document.getElementById("err-server").classList.remove("show");
});

document.getElementById("password").addEventListener("input", function () {
  clearFieldError("password", "err-password");
});

// ── Auto-focus the first field when the page loads ────────────────────────────
document.getElementById("name").focus();

</script>
</body>
</html>
