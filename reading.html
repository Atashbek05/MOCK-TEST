<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Reading Test – IELTS Mock</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

/* ── Header ── */
.header {
  background: white;
  padding: 14px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo { font-weight: bold; font-size: 18px; }

.timer {
  font-size: 20px;
  font-weight: bold;
  color: #333;
  background: #f4f4f4;
  padding: 6px 18px;
  border-radius: 20px;
}

.timer.warning { color: #e53935; animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.header-label { font-size: 13px; color: #888; }

/* ── Section stepper ── */
.section-stepper {
  background: white;
  border-bottom: 1px solid #e5e7eb;
  padding: 10px 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 13px;
  position: sticky;
  top: 57px;
  z-index: 9;
}

.step { display: flex; align-items: center; gap: 6px; color: #9ca3af; font-weight: 600; }
.step.done   { color: #16a34a; }
.step.active { color: #2563eb; }

.step-dot {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid currentColor;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
}

.step.done .step-dot::before   { content: "✓"; }
.step.active .step-dot::before { content: "●"; font-size: 8px; }
.step:not(.done):not(.active) .step-dot::before { content: attr(data-n); }

.step-arrow { color: #d1d5db; font-size: 14px; }

/* ── Passage tabs ── */
.passage-tabs {
  background: white;
  border-bottom: 1px solid #e5e7eb;
  padding: 0 20px;
  display: flex;
  gap: 4px;
  position: sticky;
  top: 99px;
  z-index: 8;
}

.tab-btn {
  padding: 12px 20px;
  border: none;
  background: none;
  font-size: 14px;
  font-weight: 600;
  color: #6b7280;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}

.tab-btn:hover { color: #374151; }

.tab-btn.active {
  color: #2563eb;
  border-bottom-color: #2563eb;
}

.tab-btn .tab-badge {
  display: inline-block;
  background: #e5e7eb;
  color: #6b7280;
  font-size: 11px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 6px;
  transition: all 0.2s;
}

.tab-btn.active .tab-badge {
  background: #dbeafe;
  color: #2563eb;
}

.tab-btn.complete .tab-badge {
  background: #dcfce7;
  color: #16a34a;
}

/* ── Two-column layout ── */
.layout {
  display: flex;
  gap: 20px;
  max-width: 1280px;
  margin: 20px auto;
  padding: 0 20px;
}

/* ── Passage panel (left, sticky) ── */
.passage-panel {
  flex: 1;
  background: white;
  border-radius: 12px;
  padding: 28px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  height: calc(100vh - 170px);
  overflow-y: auto;
  position: sticky;
  top: 148px;
}

.panel-label {
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #aaa;
  margin-bottom: 6px;
}

.passage-title {
  font-size: 17px;
  font-weight: 700;
  color: #111;
  margin-bottom: 18px;
  line-height: 1.3;
  border-left: 3px solid #2563eb;
  padding-left: 12px;
}

.passage-panel p {
  line-height: 1.85;
  font-size: 15px;
  color: #333;
  margin-bottom: 16px;
}

/* ── Questions panel (right) ── */
.questions-panel { flex: 1; }

.passage-section { display: none; }
.passage-section.active { display: block; }

.section-heading {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #6b7280;
  margin-bottom: 14px;
  padding: 10px 0 10px;
  border-bottom: 1px solid #f0f0f0;
}

.question-card {
  background: white;
  border-radius: 12px;
  padding: 22px 24px;
  margin-bottom: 14px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  border-left: 3px solid transparent;
  transition: border-color 0.2s;
}

.question-card.answered { border-left-color: #4caf50; }

.question-num {
  font-size: 11px;
  color: #aaa;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.question-card > p {
  font-size: 15px;
  color: #222;
  line-height: 1.5;
  margin-bottom: 14px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 6px;
  cursor: pointer;
  border: 1.5px solid #eee;
  transition: all 0.15s;
}

.option:hover { background: #fafafa; border-color: #ccc; }

.option.selected {
  background: #f0f4ff;
  border-color: #2563eb;
}

.option input[type="radio"] {
  margin-top: 3px;
  accent-color: #2563eb;
  flex-shrink: 0;
}

.option label {
  cursor: pointer;
  font-size: 14px;
  color: #444;
  line-height: 1.45;
}

/* ── Navigation between passages ── */
.passage-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  margin-top: 8px;
}

.btn-nav {
  padding: 10px 24px;
  background: #f3f4f6;
  color: #374151;
  border: 1.5px solid #e5e7eb;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-nav:hover { background: #e5e7eb; }
.btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Submit area ── */
.submit-area {
  padding: 20px 0 60px;
  text-align: center;
}

.overall-progress {
  background: white;
  border-radius: 12px;
  padding: 18px 24px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  text-align: left;
}

.overall-progress .label {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 8px;
}

.overall-progress .label span { font-weight: 700; color: #111; }

.progress-bar-wrap {
  background: #e0e0e0;
  border-radius: 20px;
  height: 8px;
  overflow: hidden;
}

.progress-bar-fill {
  background: #4caf50;
  height: 100%;
  border-radius: 20px;
  transition: width 0.3s;
  width: 0%;
}

.btn-submit {
  padding: 14px 50px;
  background: black;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  transition: opacity 0.2s;
}

.btn-submit:hover { opacity: 0.85; }
.btn-submit:disabled { background: #aaa; cursor: not-allowed; opacity: 1; }

/* ── Loading / Error ── */
.loading-screen {
  text-align: center;
  padding: 80px 20px;
  font-size: 16px;
  color: #888;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #ddd;
  border-top-color: #2563eb;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
  background: #ffebee;
  color: #c62828;
  padding: 18px 24px;
  border-radius: 10px;
  margin: 30px auto;
  max-width: 500px;
  text-align: center;
  font-size: 15px;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .passage-panel {
    position: static;
    height: auto;
    max-height: 280px;
  }
}
</style>
<link rel="stylesheet" href="theme.css">
<script src="theme.js"></script>
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="logo">IELTS MOCK TEST</div>
  <div id="timer" class="timer">60:00</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <button id="theme-toggle" aria-label="Switch to dark mode" title="Switch to dark mode"></button>
    <div class="header-label">Reading Test</div>
  </div>
</div>

<!-- Section progress -->
<div class="section-stepper">
  <div class="step active">
    <div class="step-dot" data-n="1"></div> Reading
  </div>
  <div class="step-arrow">›</div>
  <div class="step">
    <div class="step-dot" data-n="2"></div> Listening
  </div>
  <div class="step-arrow">›</div>
  <div class="step">
    <div class="step-dot" data-n="3"></div> Writing
  </div>
</div>

<!-- Loading screen -->
<div id="loading-screen" class="loading-screen">
  <div class="spinner"></div>
  Loading test...
</div>

<!-- Main content (hidden until test is loaded) -->
<div id="main-content" style="display:none;">

  <!-- Passage tabs -->
  <div class="passage-tabs" id="passage-tabs"></div>

  <div class="layout">

    <!-- Left: passage text -->
    <div class="passage-panel">
      <div class="panel-label">Reading Passage</div>
      <div class="passage-title" id="passage-title"></div>
      <div id="passage-text"></div>
    </div>

    <!-- Right: questions by passage section -->
    <div class="questions-panel">
      <div id="questions-container"></div>

      <!-- Overall progress + submit -->
      <div class="submit-area">
        <div class="overall-progress">
          <div class="label">
            Overall progress: <span id="answered-count">0</span> / <span id="total-count">0</span> questions answered
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
        </div>
        <button class="btn-submit" id="submit-btn" onclick="submitTest()">
          Submit Reading Test
        </button>
      </div>
    </div>

  </div>
</div>

<script src="api.js"></script>
<script src="auth.js"></script>
<script>
// ── Auth ──────────────────────────────────────────────────────────────────────
const token = requireAuth();

let testId        = null;
let totalQuestions = 0;
let currentPassageIndex = 0;
let passagesData  = [];     // full array of passages from API
let timerInterval = null;
let secondsLeft   = 60 * 60;

// ── Timer ────────────────────────────────────────────────────────────────────
function startTimer() {
  timerInterval = setInterval(() => {
    secondsLeft--;
    const m  = Math.floor(secondsLeft / 60);
    const s  = secondsLeft % 60;
    const el = document.getElementById("timer");
    el.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    if (secondsLeft <= 300) el.classList.add("warning");
    if (secondsLeft <= 0) { clearInterval(timerInterval); submitTest(); }
  }, 1000);
}

// ── Load random reading test ──────────────────────────────────────────────────
async function loadTest() {
  try {
    const res = await fetch(`${API_BASE}/random-reading-test`, {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (res.status === 401) { logout(); return; }
    if (!res.ok) { showError("Failed to load test. Please refresh the page."); return; }

    const data = await res.json();
    testId       = data.id;
    passagesData = data.passages;

    // Count total questions across all passages
    totalQuestions = passagesData.reduce((sum, p) => sum + p.questions.length, 0);

    // Record exam start time (used by final-result page for duration)
    localStorage.setItem("examStartTime", Date.now());

    buildTabs();
    buildQuestions();
    switchToPassage(0);

    document.getElementById("total-count").textContent = totalQuestions;
    document.getElementById("loading-screen").style.display = "none";
    document.getElementById("main-content").style.display  = "block";

    startTimer();

  } catch (err) {
    showError("Cannot connect to server. Please check your connection.");
    console.error(err);
  }
}

// ── Build passage tabs ────────────────────────────────────────────────────────
function buildTabs() {
  const container = document.getElementById("passage-tabs");
  container.innerHTML = passagesData.map((p, i) => `
    <button class="tab-btn ${i === 0 ? "active" : ""}" id="tab-${i}"
            onclick="switchToPassage(${i})">
      Passage ${p.order}
      <span class="tab-badge" id="badge-${i}">0/${p.questions.length}</span>
    </button>
  `).join("");
}

// ── Build all question cards (one section per passage) ────────────────────────
function buildQuestions() {
  const container = document.getElementById("questions-container");
  let globalNum = 0;  // question number across all passages

  container.innerHTML = passagesData.map((p, pi) => {
    const questionsHtml = p.questions.map((q, qi) => {
      globalNum++;
      return `
        <div class="question-card" id="card-${q.id}">
          <div class="question-num">Question ${globalNum}</div>
          <p>${q.question_text}</p>
          ${["A","B","C","D"].map(letter => `
            <div class="option" id="opt-${q.id}-${letter}"
                 onclick="selectOption(${q.id}, '${letter}', ${pi})">
              <input type="radio" name="q${q.id}" value="${letter}" id="r${q.id}${letter}">
              <label for="r${q.id}${letter}">
                <strong>${letter}.</strong> ${q["option_" + letter.toLowerCase()]}
              </label>
            </div>
          `).join("")}
        </div>`;
    }).join("");

    return `
      <div class="passage-section ${pi === 0 ? "active" : ""}" id="section-${pi}">
        <div class="section-heading">Passage ${p.order} — ${p.questions.length} Questions</div>
        ${questionsHtml}
        <div class="passage-nav">
          <button class="btn-nav" onclick="switchToPassage(${pi-1})"
                  ${pi === 0 ? "disabled" : ""}>
            ← Previous Passage
          </button>
          ${pi < passagesData.length - 1
            ? `<button class="btn-nav" onclick="switchToPassage(${pi+1})">Next Passage →</button>`
            : `<span style="font-size:13px;color:#6b7280">Last passage — scroll down to submit</span>`
          }
        </div>
      </div>`;
  }).join("");
}

// ── Switch active passage ─────────────────────────────────────────────────────
function switchToPassage(index) {
  if (index < 0 || index >= passagesData.length) return;
  currentPassageIndex = index;

  // Update passage text panel
  const p = passagesData[index];
  document.getElementById("passage-title").textContent = p.title;
  const textEl = document.getElementById("passage-text");
  textEl.innerHTML = p.text.split("\n\n").filter(s => s.trim())
    .map(s => `<p>${s.trim()}</p>`).join("");

  // Scroll passage to top
  textEl.closest(".passage-panel").scrollTop = 0;

  // Update tab highlight
  document.querySelectorAll(".tab-btn").forEach((btn, i) => {
    btn.classList.toggle("active", i === index);
  });

  // Update question section visibility
  document.querySelectorAll(".passage-section").forEach((sec, i) => {
    sec.classList.toggle("active", i === index);
  });
}

// ── Select option ─────────────────────────────────────────────────────────────
function selectOption(questionId, letter, passageIndex) {
  // Clear old highlights for this question
  ["A","B","C","D"].forEach(l => {
    const el = document.getElementById(`opt-${questionId}-${l}`);
    if (el) el.classList.remove("selected");
  });

  document.getElementById(`opt-${questionId}-${letter}`).classList.add("selected");
  document.getElementById(`r${questionId}${letter}`).checked = true;
  document.getElementById(`card-${questionId}`).classList.add("answered");

  updateProgress(passageIndex);
}

// ── Progress bar + tab badges ─────────────────────────────────────────────────
function updateProgress(changedPassageIndex) {
  let totalAnswered = 0;

  passagesData.forEach((p, pi) => {
    let passageAnswered = 0;
    p.questions.forEach(q => {
      if (document.querySelector(`input[name="q${q.id}"]:checked`)) {
        passageAnswered++;
        totalAnswered++;
      }
    });
    // Update tab badge
    const badge = document.getElementById(`badge-${pi}`);
    if (badge) {
      badge.textContent = `${passageAnswered}/${p.questions.length}`;
      const tab = document.getElementById(`tab-${pi}`);
      if (tab) {
        tab.classList.toggle("complete", passageAnswered === p.questions.length);
      }
    }
  });

  document.getElementById("answered-count").textContent = totalAnswered;
  const pct = totalQuestions > 0 ? (totalAnswered / totalQuestions) * 100 : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
}

// ── Submit test ───────────────────────────────────────────────────────────────
async function submitTest() {
  clearInterval(timerInterval);

  // Collect answers across ALL passages
  const answers = {};
  let unanswered = 0;

  passagesData.forEach(p => {
    p.questions.forEach(q => {
      const checked = document.querySelector(`input[name="q${q.id}"]:checked`);
      if (checked) {
        answers[q.id] = checked.value;
      } else {
        unanswered++;
      }
    });
  });

  if (unanswered > 0) {
    const go = confirm(
      `You have ${unanswered} unanswered question(s).\nSubmit anyway?`
    );
    if (!go) { startTimer(); return; }
  }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Submitting...";

  try {
    const res = await fetch(`${API_BASE}/submit-reading-test`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: `Bearer ${token}`
      },
      body: JSON.stringify({ test_id: testId, answers })
    });

    if (res.status === 401) { logout(); return; }

    if (!res.ok) {
      btn.disabled = false;
      btn.textContent = "Submit Reading Test";
      showError("Submission failed. Please try again.");
      startTimer();
      return;
    }

    const result = await res.json();

    // Save for final-result page
    localStorage.setItem("readingScore",   result.band);
    localStorage.setItem("readingCorrect", result.correct);
    localStorage.setItem("readingTotal",   result.total);

    window.location.href = "listening.html";

  } catch (err) {
    btn.disabled = false;
    btn.textContent = "Submit Reading Test";
    showError("Cannot connect to server. Please try again.");
    startTimer();
    console.error(err);
  }
}

// ── Error helper ──────────────────────────────────────────────────────────────
function showError(msg) {
  const ls = document.getElementById("loading-screen");
  ls.innerHTML = `<div class="error-banner">${msg}</div>`;
  ls.style.display = "block";
}

// ── Start ─────────────────────────────────────────────────────────────────────
loadTest();
</script>

</body>
</html>
