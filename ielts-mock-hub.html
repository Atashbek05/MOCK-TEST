<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test Hub — IELTS Mock</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; }

.header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
.header-left { display: flex; align-items: center; gap: 20px; }
.logo { font-size: 17px; font-weight: 800; color: #0f172a; text-decoration: none; letter-spacing: -.02em; }
.logo .accent { color: #059669; }
.btn-back { font-size: 13px; color: #64748b; text-decoration: none; font-weight: 600; }
.btn-back:hover { color: #059669; }
.header-right { display: flex; align-items: center; gap: 10px; }
.btn-logout { font-size: 13px; font-weight: 600; color: #64748b; background: #f1f5f9; border: none; padding: 7px 14px; border-radius: 8px; cursor: pointer; }
.btn-logout:hover { background: #e2e8f0; }

.main { max-width: 640px; margin: 0 auto; padding: 28px 16px 60px; }
.slot-badge { display: inline-block; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
h1 { font-size: 22px; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }

.section-card {
  background: white;
  border: 1.5px solid #e2e8f0;
  border-radius: 16px;
  padding: 20px 22px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: box-shadow .15s, border-color .15s;
}
.section-card:hover { box-shadow: 0 4px 16px rgba(5,150,105,.12); border-color: #6ee7b7; }
.section-icon { flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 52px; height: 52px; border-radius: 14px; }
.s-listen { background: #ecfdf5; }
.s-read   { background: #eff6ff; }
.s-write  { background: #fff7ed; }
.section-body { flex: 1; min-width: 0; }
.section-name { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 3px; }
.section-meta { font-size: 12px; color: #64748b; }
.section-status { flex-shrink: 0; }

.btn-start {
  display: inline-block;
  background: #059669;
  color: white;
  font-size: 13px;
  font-weight: 700;
  padding: 9px 18px;
  border-radius: 10px;
  text-decoration: none;
  white-space: nowrap;
  transition: background .15s;
  border: none;
  cursor: pointer;
}
.btn-start:hover { background: #047857; }
.btn-start.locked { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; pointer-events: none; }
.btn-start.done { background: #d1fae5; color: #065f46; cursor: default; pointer-events: none; }

.band-pill {
  display: inline-block;
  background: #059669;
  color: white;
  font-size: 12px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 20px;
}
.band-pill.pending { background: #fef3c7; color: #92400e; }

.overall-card {
  display: none;
  background: linear-gradient(135deg, #ecfdf5, #d1fae5);
  border: 1.5px solid #6ee7b7;
  border-radius: 16px;
  padding: 22px 24px;
  margin-top: 24px;
  text-align: center;
}
.overall-label { font-size: 12px; font-weight: 700; color: #059669; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
.overall-band { font-size: 44px; font-weight: 900; color: #065f46; margin-bottom: 4px; }
.overall-sub { font-size: 13px; color: #047857; }

.loading { color: #94a3b8; font-size: 13px; padding: 20px 0; text-align: center; }
</style>
<link rel="stylesheet" href="theme.css">
<script src="theme.js"></script>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="logo" href="dashboard.html">IELTS <span class="accent">MOCK</span></a>
    <a class="btn-back" href="dashboard.html">← Back</a>
  </div>
  <div class="header-right">
    <button id="theme-toggle" aria-label="Switch to dark mode" title="Switch to dark mode"></button>
    <span id="header-name" style="font-size:13px;font-weight:600;color:#64748b;"></span>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</header>

<main class="main">
  <div id="content">
    <div class="loading">
      <div style="font-size:28px;margin-bottom:12px;">⏳</div>
      Loading your IELTS Mock Test…
      <div style="font-size:12px;color:#94a3b8;margin-top:8px;" id="loading-sub">Connecting to server…</div>
    </div>
  </div>
</main>

<script>
const API_BASE = "https://mock-test-3-t0pr.onrender.com";
const token = localStorage.getItem("token");
const params = new URLSearchParams(location.search);
const attemptId = parseInt(params.get("attempt_id") || "0", 10);

function logout() { localStorage.clear(); location.href = "login.html"; }
function authH() { return { "Authorization": "Bearer " + token }; }

function showError(msg) {
  document.getElementById("content").innerHTML = `
    <div style="text-align:center;padding:60px 20px;">
      <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
      <div style="font-size:15px;font-weight:700;color:#ef4444;margin-bottom:8px;">Could not load test</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:20px;">${msg}</div>
      <button onclick="init()" style="background:#059669;color:white;border:none;padding:9px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">Retry</button>
      <a href="dashboard.html" style="display:block;margin-top:12px;font-size:13px;color:#94a3b8;">← Back to dashboard</a>
    </div>`;
}

async function fetchWithTimeout(url, opts, ms = 90000) {
  const ctrl = new AbortController();
  const id = setTimeout(() => ctrl.abort(), ms);
  try { return await fetch(url, { ...opts, signal: ctrl.signal }); }
  finally { clearTimeout(id); }
}

let _retryCount = 0;

async function init() {
  if (!token) { location.href = "login.html"; return; }
  if (!attemptId) { location.href = "dashboard.html"; return; }

  // Show loading state
  document.getElementById("content").innerHTML = `
    <div class="loading">
      <div style="font-size:28px;margin-bottom:12px;">⏳</div>
      Loading your IELTS Mock Test…
      <div style="font-size:12px;color:#94a3b8;margin-top:8px;" id="loading-sub">Connecting to server…</div>
    </div>`;

  // User name
  fetch(`${API_BASE}/me`, { headers: authH() })
    .then(r => r.json())
    .then(u => { const el = document.getElementById("header-name"); if (el) el.textContent = u.name || ""; })
    .catch(() => {});

  const subEl = () => document.getElementById("loading-sub");
  const t1 = setTimeout(() => { const el = subEl(); if (el) el.textContent = "Server is waking up — please wait…"; }, 5000);
  const t2 = setTimeout(() => { const el = subEl(); if (el) el.textContent = "Almost there, server is starting…"; }, 25000);
  const t3 = setTimeout(() => { const el = subEl(); if (el) el.textContent = "Taking longer than usual, still trying…"; }, 50000);

  let attempt;
  try {
    const res = await fetchWithTimeout(`${API_BASE}/mock/attempts/${attemptId}`, { headers: authH() });
    clearTimeout(t1); clearTimeout(t2); clearTimeout(t3);
    if (res.status === 401) { location.href = "login.html"; return; }
    if (!res.ok) {
      const body = await res.text();
      let detail = body;
      try { detail = JSON.parse(body).detail || body; } catch (_) {}
      showError(`Error ${res.status}: ${detail}`);
      return;
    }
    attempt = await res.json();
  } catch (e) {
    clearTimeout(t1); clearTimeout(t2); clearTimeout(t3);
    if (e.name === "AbortError" && _retryCount < 2) {
      _retryCount++;
      // auto-retry with countdown
      let sec = 5;
      const tick = () => {
        const el = document.getElementById("loading-sub");
        if (el) el.textContent = `Server is slow — auto-retrying in ${sec}s…`;
        if (sec-- > 0) setTimeout(tick, 1000); else init();
      };
      document.getElementById("content").innerHTML = `
        <div class="loading">
          <div style="font-size:28px;margin-bottom:12px;">⏳</div>
          Server is taking time to wake up…
          <div style="font-size:12px;color:#94a3b8;margin-top:8px;" id="loading-sub"></div>
        </div>`;
      tick();
      return;
    }
    showError(e.name === "AbortError"
      ? "Server did not respond. Please click Retry."
      : `Network error: ${e.message}`);
    return;
  }

  _retryCount = 0;
  render(attempt);
}

function render(attempt) {
  const lisDone  = !!attempt.listening_submitted_at;
  const readDone = !!attempt.reading_submitted_at;
  const writDone = !!attempt.writing_submitted_at;

  const lisUrl  = `ielts-listening.html?attempt_id=${attempt.id}`;
  const readUrl = `ielts-exam.html?attempt_id=${attempt.id}&test_id=${attempt.reading_test_id}`;
  const writUrl = `writing.html?attempt_id=${attempt.id}`;

  function sectionBtn(url, done, unlocked) {
    if (done)      return `<span class="btn-start done">✓ Done</span>`;
    if (!unlocked) return `<span class="btn-start locked">🔒 Locked</span>`;
    return `<a class="btn-start" href="${url}">Start →</a>`;
  }

  function bandPill(band, done) {
    if (!done)       return `<span class="band-pill pending">Pending</span>`;
    if (band == null) return `<span class="band-pill pending">Scoring…</span>`;
    return `<span class="band-pill">Band ${band}</span>`;
  }

  const allDone = lisDone && readDone && writDone;
  const overallHtml = allDone && attempt.overall_band != null ? `
    <div class="overall-card" style="display:block;">
      <div class="overall-label">Overall Band Score</div>
      <div class="overall-band">${attempt.overall_band}</div>
      <div class="overall-sub">Listening ${attempt.listening_band} · Reading ${attempt.reading_band} · Writing ${attempt.writing_band}</div>
    </div>` : (allDone ? `
    <div class="overall-card" style="display:block;">
      <div class="overall-label">All sections complete</div>
      <div style="font-size:14px;color:#047857;margin-top:6px;">Writing is being graded by AI — check back shortly.</div>
    </div>` : "");

  document.getElementById("content").innerHTML = `
    <div class="slot-badge">Attempt #${attempt.slot_number}</div>
    <h1>Full IELTS Mock Test</h1>
    <p class="subtitle">Complete all three sections in order: Listening → Reading → Writing</p>

    <div class="section-card">
      <div class="section-icon s-listen"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M4 13C4 8.6 7.6 5 12 5C16.4 5 20 8.6 20 13" stroke="#10b981" stroke-width="2" stroke-linecap="round"/><rect x="2" y="13" width="5" height="7" rx="2.5" fill="#a7f3d0" stroke="#10b981" stroke-width="1.5"/><rect x="17" y="13" width="5" height="7" rx="2.5" fill="#a7f3d0" stroke="#10b981" stroke-width="1.5"/><path d="M10 17.5C10 16.1 10.9 15 12 15C13.1 15 14 16.1 14 17.5" stroke="#10b981" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.8"/><circle cx="12" cy="18.5" r="1.1" fill="#10b981" opacity="0.8"/></svg></div>
      <div class="section-body">
        <div class="section-name">Part 1 — Listening</div>
        <div class="section-meta">40 questions · ~30 min</div>
        <div style="margin-top:6px;">${bandPill(attempt.listening_band, lisDone)}</div>
      </div>
      <div class="section-status">${sectionBtn(lisUrl, lisDone, true)}</div>
    </div>

    <div class="section-card">
      <div class="section-icon s-read"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="M3 5C3 4.4 3.6 4 4 4H11C11.6 4 12 4.4 12 5V20C9 19.4 5 19.6 4 20C3.4 20 3 19.6 3 19V5Z" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/><path d="M21 5C21 4.4 20.4 4 20 4H13C12.4 4 12 4.4 12 5V20C15 19.4 19 19.6 20 20C20.6 20 21 19.6 21 19V5Z" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" stroke-linejoin="round"/><line x1="12" y1="4" x2="12" y2="20" stroke="#2563eb" stroke-width="1.5"/><line x1="5" y1="8.5" x2="10" y2="8.5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.6"/><line x1="5" y1="11.5" x2="10" y2="11.5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.6"/><line x1="5" y1="14.5" x2="8.5" y2="14.5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.6"/><line x1="14" y1="8.5" x2="19" y2="8.5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.6"/><line x1="14" y1="11.5" x2="19" y2="11.5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.6"/><line x1="14" y1="14.5" x2="17.5" y2="14.5" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.6"/></svg></div>
      <div class="section-body">
        <div class="section-name">Part 2 — Reading</div>
        <div class="section-meta">40 questions · 60 min</div>
        <div style="margin-top:6px;">${bandPill(attempt.reading_band, readDone)}</div>
      </div>
      <div class="section-status">${sectionBtn(readUrl, readDone, lisDone)}</div>
    </div>

    <div class="section-card">
      <div class="section-icon s-write"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M16 3.5L20.5 8L8.5 20L4 21L5 16.5L16 3.5Z" fill="#fde68a" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/><path d="M14 5.5L18.5 10" stroke="#d97706" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/><path d="M16 3.5L18 2C18.8 1.3 20.2 1.5 21 2.5L22 3.5C22.8 4.5 22.6 5.8 22 6.5L20.5 8" fill="#fb923c" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/><path d="M4 21H12" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/></svg></div>
      <div class="section-body">
        <div class="section-name">Part 3 — Writing</div>
        <div class="section-meta">2 tasks · 60 min · AI-graded</div>
        <div style="margin-top:6px;">${bandPill(attempt.writing_band, writDone)}</div>
      </div>
      <div class="section-status">${sectionBtn(writUrl, writDone, readDone)}</div>
    </div>

    ${overallHtml}
  `;
}

init();
</script>
</body>
</html>
